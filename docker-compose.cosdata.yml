services:
  cosdata:
    image: cosdatateam/cosdata:latest
    container_name: cosdata
    command: ["/opt/cosdata/bin/cosdata", "--admin-key", "admin"]
    ports:
      - "8443:8443"
      - "50051:50051"
    volumes:
      - cosdata_data:/opt/cosdata/data
    environment:
      - COSDATA_HOME=/opt/cosdata
    restart: unless-stopped

volumes:
  cosdata_data:
    driver: local
